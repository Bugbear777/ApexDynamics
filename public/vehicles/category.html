<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex Dynamics | Vehicle Category</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="header"></div>

  <main class="category-page">
    <section class="category-hero">
      <p class="category-eyebrow">Vehicle Catalog</p>
      <h1 id="category-title">Vehicles</h1>
      <p id="category-description">
        Browse our vehicle catalog.
      </p>
    </section>

    <section class="category-toolbar">
      <p id="category-count">Loading vehicles...</p>
    </section>

    <section class="vehicle-list-section">
      <div id="vehicle-grid" class="vehicle-grid"></div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="/js/main.js"></script>
  <script src="/js/category.js"></script>
</body>
</html>
